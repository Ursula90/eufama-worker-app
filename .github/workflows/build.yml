name: Build EUFAMA Worker APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev build-essential \
            libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-v4-ndk25b-${{ hashFiles('buildozer.spec') }}

      - name: Cache Buildozer build directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-v4-ndk25b-${{ hashFiles('buildozer.spec') }}

      - name: Build APK with Buildozer
        run: |
          yes | buildozer android debug
        env:
          ANDROID_ACCEPT_SDK_LICENSE: y

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eufama-worker-apk
          path: bin/*.apk
          retention-days: 90
